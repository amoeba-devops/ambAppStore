server {
    listen 80;
    server_name apps.amoeba.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name apps.amoeba.site;

    # SSL certificates (managed by certbot or similar)
    ssl_certificate     /etc/letsencrypt/live/apps.amoeba.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apps.amoeba.site/privkey.pem;

    # -- SSL hardening --
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # -- Security headers --
    add_header Content-Security-Policy "frame-ancestors 'self' https://ama.amoeba.site https://stg-ama.amoeba.site" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # -- Gzip --
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # -- Client body size (file uploads) --
    client_max_body_size 10M;

    # -- Common proxy headers macro --
    # (used inline below for each location)

    # --- Platform Landing (root) ---
    # Handles /, /apps/:slug, /admin/* — all SPA routes
    location / {
        proxy_pass http://web-platform:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Platform API ---
    location /api/ {
        proxy_pass http://bff-platform:3100/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # --- App: app-car-manager ---
    location /app-car-manager/ {
        alias /usr/share/nginx/html/app-car-manager/;
        try_files $uri $uri/ /app-car-manager/index.html;
    }
    location /app-car-manager/api/ {
        proxy_pass http://bff-app-car-manager:3101/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- App: app-hscode ---
    location /app-hscode/ {
        alias /usr/share/nginx/html/app-hscode/;
        try_files $uri $uri/ /app-hscode/index.html;
    }
    location /app-hscode/api/ {
        proxy_pass http://bff-app-hscode:3102/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- App: app-sales-report ---
    location /app-sales-report/ {
        alias /usr/share/nginx/html/app-sales-report/;
        try_files $uri $uri/ /app-sales-report/index.html;
    }
    location /app-sales-report/api/ {
        proxy_pass http://bff-app-sales-report:3103/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- App: app-stock-management ---
    location /app-stock-management/ {
        alias /usr/share/nginx/html/app-stock-management/;
        try_files $uri $uri/ /app-stock-management/index.html;
    }
    location /app-stock-management/api/ {
        proxy_pass http://bff-app-stock-management:3104/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
