version: '3.8'

services:
  bff-car-manager:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    container_name: bff-car-manager
    ports:
      - "3101:3101"
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
      - PORT=3101
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3101/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - amb-apps-network

  web-car-manager:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/app-car-manager/api}
        VITE_AMA_LOGIN_URL: ${VITE_AMA_LOGIN_URL:-https://ama.amoeba.site/login}
    container_name: web-car-manager
    ports:
      - "5201:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - amb-apps-network

networks:
  amb-apps-network:
    external: true
