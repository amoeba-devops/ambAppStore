version: '3.8'

services:
  bff-platform:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bff-platform
    ports:
      - "3100:3100"
    environment:
      - NODE_ENV=production
      - PORT=3100
    env_file:
      - ./backend/.env
    depends_on:
      - mysql-apps
    restart: unless-stopped
    networks:
      - amb-network

  web-platform:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: web-platform
    ports:
      - "5200:80"
    restart: unless-stopped
    networks:
      - amb-network

  mysql-apps:
    image: mysql:8.0
    container_name: mysql-apps
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/scripts:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    networks:
      - amb-network

volumes:
  mysql-data:

networks:
  amb-network:
    driver: bridge
