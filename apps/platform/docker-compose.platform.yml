version: '3.8'

services:
  bff-platform:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    container_name: bff-platform
    ports:
      - "3100:3100"
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
      - PORT=3100
    depends_on:
      mysql-apps:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3100/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - amb-apps-network

  web-platform:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_AMA_LOGIN_URL: ${VITE_AMA_LOGIN_URL:-https://ama.amoeba.site/login}
    container_name: web-platform
    ports:
      - "5200:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - amb-apps-network

  mysql-apps:
    image: mysql:8.0
    container_name: mysql-apps
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/01-platform.sql:ro
      - ./backend/scripts/seed-apps.sql:/docker-entrypoint-initdb.d/02-platform-seed.sql:ro
      - ../app-car-manager/backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/03-car.sql:ro
      - ../app-stock-management/backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/04-stock.sql:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - amb-apps-network

volumes:
  mysql-data:

networks:
  amb-apps-network:
    external: true
